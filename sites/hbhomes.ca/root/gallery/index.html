<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Muskoka Excavation & Rock Blasting Gallery | Hammel Bay Homes</title>

<meta name="description" content="Gallery of excavation and rock blasting projects across Muskoka including trenching, drainage, driveways and rock removal.">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div id="header"></div>

<section class="hero">

<h2>Project Gallery</h2>

<p>Excavation & Rock Blasting Projects Across Muskoka</p>

<p>Huntsville • Bracebridge • Lake of Bays • Gravenhurst</p>

<a class="button" href="/contact/index.html">Request a Quote</a>

</section>

<div class="container">

<h2>Our Work</h2>

<div class="gallery-wrapper">

<div class="main-image">
<img id="currentImage" src="/images/gallery1.jpg" alt="Excavation project">
</div>

<div class="thumbnails">
<img src="/images/gallery1.jpg" class="active" onclick="setImage(this)">
<img src="/images/gallery2.jpg" onclick="setImage(this)">
<img src="/images/gallery3.jpg" onclick="setImage(this)">
<img src="/images/gallery4.jpg" onclick="setImage(this)">
<img src="/images/gallery5.jpg" onclick="setImage(this)">
<img src="/images/gallery7.jpg" onclick="setImage(this)">
<img src="/images/gallery8.jpg" onclick="setImage(this)">
<img src="/images/gallery9.jpg" onclick="setImage(this)">
<img src="/images/gallery10.jpg" onclick="setImage(this)">
<img src="/images/gallery11.jpg" onclick="setImage(this)">
<img src="/images/gallery13.jpg" onclick="setImage(this)">
<img src="/images/gallery12.jpg" onclick="setImage(this)">
<img src="/images/gallery14.jpg" onclick="setImage(this)">
<img src="/images/gallery6.jpg" onclick="setImage(this)">
</div>

</div>

</div>

<div id="footer"></div>

<!-- HEADER / FOOTER LOAD -->
<script>
document.addEventListener("DOMContentLoaded", function() {

  fetch('/includes/header.html')
    .then(res => res.text())
    .then(data => document.getElementById('header').innerHTML = data);

  fetch('/includes/footer.html')
    .then(res => res.text())
    .then(data => document.getElementById('footer').innerHTML = data);

});
</script>

<!-- 🔥 GALLERY FUNCTION (THIS WAS MISSING) -->
<script>
function setImage(img){
  const main = document.getElementById("currentImage");
  main.src = img.src;

  document.querySelectorAll('.thumbnails img').forEach(i => i.classList.remove('active'));
  img.classList.add('active');
}
</script>

</body>
</html>
